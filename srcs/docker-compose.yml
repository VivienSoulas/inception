services:

  mariadb:
      build:
          context: requirements/MariaDB

      container_name: mariadb

      env_file:
          - .env

      volumes:
          - mariadb_volume:/var/lib/mysql

      networks:
          - inception

      restart: always

  wordpress:
      build:
          context: requirements/WordPress

      container_name: wordpress

      env_file:
          - .env

      volumes:
          - wordpress_volume:/var/www/html

      networks:
          - inception
          
      depends_on:
          - mariadb

      restart: always

  nginx:
      build:
          context: requirements/NGINX

      container_name: nginx

      env_file:
          - .env

      volumes:
          - wordpress_volume:/var/www/html:ro

      networks:
          - inception
          
      depends_on:
          - wordpress

      restart: always

      ports:
          - "443:443"


volumes:
  mariadb_volume:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/${LOGIN}/data/mariadb
  wordpress_volume:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/${LOGIN}/data/wordpress

networks:
  inception: