services:

  mariadb:
      build:
          context: requirements/MariaDB

      container_name: mariadb

      env_file:
          - .env

      volumes:
          - database:/var/lib/mysql

      networks:
          - inception

      restart: always



  wordpress:
      build:
          context: requirements/WordPress

      container_name: wordpress

      env_file:
          - .env

      volumes:
          - wordpress:/var/www/html

      networks:
          - inception
          
      depends_on:
          - mariadb

      restart: always


volumes:
  database:
  wordpress:

networks:
  inception: